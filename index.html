// Top 4 non-overlapping clusters at each radius (greedy disc removal)
const CLUSTERS_5MI = [
  {lat:33.4680, lng:-82.0769, count:14, city:"Augusta",            store:"361"},
  {lat:33.8413, lng:-84.3140, count:13, city:"Atlanta (Druid Hills)", store:"489"},
  {lat:33.6058, lng:-84.4351, count:13, city:"College Park",       store:"1932"},
  {lat:33.9538, lng:-84.1414, count:13, city:"Duluth",             store:"845"},
];
const CLUSTERS_10MI = [
  {lat:33.8802, lng:-84.2740, count:42, city:"Atlanta (Chamblee)", store:"2182"},
  {lat:33.9472, lng:-84.6239, count:34, city:"Marietta",           store:"1132"},
  {lat:33.6122, lng:-84.3004, count:30, city:"Ellenwood",          store:"1670"},
  {lat:34.0618, lng:-84.0762, count:24, city:"Suwanee",            store:"1215"},
];
// Atlanta metro overview (40mi from downtown)
const ATL_METRO = {lat:33.7490, lng:-84.3880, r:40, count:244, city:"Atlanta metro"};

const map = L.map('map', {preferCanvas:true}).setView([33.7, -83.5], 7);
L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
  maxZoom: 19,
  attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors'
}).addTo(map);

const allPins = L.layerGroup().addTo(map);
for (const s of STORES) {
  L.circleMarker([s.la, s.lo], {
    radius: 4, color:'#b00', weight:1, fillColor:'#f33', fillOpacity:.85
  }).bindPopup(
    `<div class="pin-popup"><b>Waffle House #${s.c}</b>${s.a}<br><small>${s.n}, GA ${s.p}</small></div>`
  ).addTo(allPins);
}

const MILES_TO_M = 1609.344;
const COLOR_5  = '#06f';
const COLOR_10 = '#093';
const COLOR_METRO = '#a0a';

const BASE_STYLE = { weight: 2, fillOpacity: .08 };
const HOVER_STYLE = { weight: 4, fillOpacity: .25 };

function makeCircle(c, miles, color, rank) {
  const anchor = c.store ? ` (anchor #${c.store})` : '';
  const title = `<b style="color:${color}">${c.city}</b> — ${c.count} stores in ${miles}mi${anchor}`;
  const circle = L.circle([c.lat, c.lng], { ...BASE_STYLE, color, bubblingMouseEvents: false }).addTo(map);
  circle.bindTooltip(title, { sticky: true, direction: 'top', className: 'circle-tip' });
  circle._meta = { color, miles, rank, city: c.city };
  circle.setRadius(miles * MILES_TO_M);
  circle.on('mouseover', () => circle.setStyle(HOVER_STYLE));
  circle.on('mouseout',  () => circle.setStyle(BASE_STYLE));
  // swallow clicks (no popup, but don't propagate to map either — feels cleaner)
  circle.on('click', () => {});
  return circle;
}

// Order: largest first so smaller circles draw on top and win hover hit-tests
const metroCircle = makeCircle(ATL_METRO, ATL_METRO.r, COLOR_METRO, 0);
const circles10 = CLUSTERS_10MI.map((c, i) => makeCircle(c, 10, COLOR_10, i+1));
const circles5  = CLUSTERS_5MI.map((c, i)  => makeCircle(c, 5,  COLOR_5,  i+1));
[metroCircle, ...circles10, ...circles5].forEach(c => c.bringToFront());
// Pins on top of everything so individual stores stay clickable inside circles
allPins.eachLayer(p => p.bringToFront());

const allBounds = L.latLngBounds(STORES.map(s => [s.la, s.lo]));
// "Fit top clusters" = the two #1 winners (Augusta 5mi + Atlanta 10mi)
const topBothBounds = L.latLngBounds([
  circles5[0].getBounds().getSouthWest(),  circles5[0].getBounds().getNorthEast(),
  circles10[0].getBounds().getSouthWest(), circles10[0].getBounds().getNorthEast(),
]);

function zoomTo(layer) { map.fitBounds(layer.getBounds(), {padding:[40,40]}); }

// Hover sync: button → highlight matching circle + show tooltip at center
function bindHover(btn, circle) {
  btn.addEventListener('mouseenter', () => {
    circle.setStyle(HOVER_STYLE);
    circle.openTooltip(circle.getLatLng());
  });
  btn.addEventListener('mouseleave', () => {
    circle.setStyle(BASE_STYLE);
    circle.closeTooltip();
  });
}

document.getElementById('btn-fit').onclick = () => map.fitBounds(topBothBounds, {padding:[40,40]});
document.getElementById('btn-all').onclick = () => map.fitBounds(allBounds, {padding:[20,20]});

function makeBtn(wrap, cls, label, circle) {
  const b = document.createElement('button');
  b.className = cls;
  b.textContent = label;
  b.onclick = () => zoomTo(circle);
  bindHover(b, circle);
  wrap.appendChild(b);
  return b;
}

const wrap5  = document.getElementById('btns-5mi');
const wrap10 = document.getElementById('btns-10mi');
CLUSTERS_5MI.forEach((c,i)  => makeBtn(wrap5,  'c5',  `#${i+1} ${c.city} (${c.count})`, circles5[i]));
CLUSTERS_10MI.forEach((c,i) => makeBtn(wrap10, 'c10', `#${i+1} ${c.city} (${c.count})`, circles10[i]));

const metroBtn = document.createElement('button');
metroBtn.textContent = `All Atlanta metro (40mi · ${ATL_METRO.count})`;
metroBtn.style.background = '#e9b8ee';
metroBtn.onclick = () => zoomTo(metroCircle);
bindHover(metroBtn, metroCircle);
document.querySelector('header').insertBefore(metroBtn, document.querySelector('header .meta'));

const legend = L.control({position:'bottomright'});
legend.onAdd = () => {
  const d = L.DomUtil.create('div','legend');
  d.innerHTML =
    '<b>Density circles</b><br>'+
    `<span class="sw" style="background:${COLOR_5}"></span>5mi clusters (top 4)<br>`+
    `<span class="sw" style="background:${COLOR_10}"></span>10mi clusters (top 4)<br>`+
    `<span class="sw" style="background:${COLOR_METRO}"></span>Atlanta metro (40mi)<br>`+
    '<span class="sw" style="background:#f33"></span>Waffle House location';
  return d;
};
legend.addTo(map);

// Restore view from ?lat&lng&z, else fit top clusters
const params = new URLSearchParams(location.search);
const qLat = parseFloat(params.get('lat'));
const qLng = parseFloat(params.get('lng'));
const qZ   = parseInt(params.get('z'), 10);
if (Number.isFinite(qLat) && Number.isFinite(qLng) && Number.isFinite(qZ)) {
  map.setView([qLat, qLng], qZ);
} else {
  map.fitBounds(topBothBounds, {padding:[40,40]});
}

let urlTimer = null;
map.on('moveend zoomend', () => {
  clearTimeout(urlTimer);
  urlTimer = setTimeout(() => {
    const c = map.getCenter();
    const u = new URL(location.href);
    u.searchParams.set('lat', c.lat.toFixed(5));
    u.searchParams.set('lng', c.lng.toFixed(5));
    u.searchParams.set('z',   String(map.getZoom()));
    history.replaceState(null, '', u);
  }, 250);
});

window.__map = map;
window.__circles5 = circles5;
window.__circles10 = circles10;
window.__metroCircle = metroCircle;
</script>
